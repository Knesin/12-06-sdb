services:

  master-2:
    image: mysql:8.4.8
    container_name: mysql_netology-master-2
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 12345
    ports:
    - "3307:3306"
    volumes:
    - mysql_data:/var/lib/mysql
    - ./master-2.cnf:/etc/mysql/conf.d/my.cnf
    - ./master-2.sql:/docker-entrypoint-initdb.d/start.sql
    networks:
    - mysql-network
    
volumes:
  mysql_data:
    driver: local

networks:
  mysql-network:
    external: true